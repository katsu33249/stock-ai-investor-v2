name: 📊 ML PHASE 2 - モデル学習

on:
  workflow_dispatch:
    inputs:
      run_note:
        description: '実行メモ（任意）'
        required: false
        default: ''

permissions:
  contents: write
  actions: read

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存ライブラリをインストール
        run: |
          pip install \
            lightgbm \
            xgboost \
            scikit-learn \
            optuna \
            pyarrow \
            pandas \
            numpy \
            loguru \
            requests

      - name: PHASE 1 Artifact（学習データ）をダウンロード
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: collect_training_data.yml
          name_is_regexp: true
          name: training-data-.*
          path: data/ml/
          search_artifacts: true

      - name: ダウンロード確認
        run: |
          ls -lh data/ml/
          # サブフォルダに展開されるので移動
          CSV=$(find data/ml/ -name "training_data.csv" | head -1)
          PQT=$(find data/ml/ -name "training_data.parquet" | head -1)
          if [ -n "$CSV" ]; then cp "$CSV" data/ml/training_data.csv && echo "CSV: OK"; fi
          if [ -n "$PQT" ]; then cp "$PQT" data/ml/training_data.parquet && echo "Parquet: OK"; fi
          RECORDS=$(python3 -c "
          import pandas as pd
          from pathlib import Path
          if Path('data/ml/training_data.parquet').exists():
              df = pd.read_parquet('data/ml/training_data.parquet')
          else:
              df = pd.read_csv('data/ml/training_data.csv')
          print(f'{len(df):,}')
          ")
          echo "✅ 学習データ: ${RECORDS}レコード"

      - name: 🤖 LightGBMモデル学習
        run: |
          python ml/train_model.py

      - name: 学習結果を確認
        id: result
        run: |
          AUC=$(cat data/ml/model_info.json | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print(d['evaluation']['auc'])
          ")
          PREC=$(cat data/ml/model_info.json | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print(d['evaluation']['precision'])
          ")
          JUDGE=$(cat data/ml/model_info.json | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print(d['evaluation']['判定'])
          ")
          echo "auc=${AUC}" >> $GITHUB_OUTPUT
          echo "precision=${PREC}" >> $GITHUB_OUTPUT
          echo "judge=${JUDGE}" >> $GITHUB_OUTPUT
          echo "AUC: ${AUC} | Precision: ${PREC} | ${JUDGE}"

      - name: モデルをArtifactに保存
        uses: actions/upload-artifact@v4
        with:
          name: ml-model-${{ github.run_number }}
          path: |
            data/ml/model.pkl
            data/ml/model_info.json
          retention-days: 90

      - name: model_info.json をリポジトリにコミット
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 ML PHASE2 モデル学習完了 - Run#${{ github.run_number }}"
          file_pattern: data/ml/model_info.json
          commit_user_name: Stock AI Bot
          commit_user_email: bot@github.actions

      - name: Discord に学習結果を通知
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python ml/notify_phase2.py ${{ github.run_number }}
