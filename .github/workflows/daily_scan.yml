# ========================================
# GitHub Actions - 毎日自動スキャン
# 平日 9:00 (JST) に自動実行
# ========================================

name: 📊 Daily Stock Scan

on:
  # 毎日平日 0:00 UTC = 9:00 JST に実行
  schedule:
    - cron: "0 0 * * 1-5"
  
  # 手動実行も可能（GitHubのActionsタブから）
  workflow_dispatch:
    inputs:
      mode:
        description: "実行モード"
        required: true
        default: "full"
        type: choice
        options:
          - full
          - policy
          - quick

jobs:
  stock-scan:
    name: 日次スクリーニング
    runs-on: ubuntu-latest
    
    steps:
      # 1. リポジトリをチェックアウト
      - name: 📥 リポジトリ取得
        uses: actions/checkout@v4
      
      # 2. Python環境のセットアップ
      - name: 🐍 Python 3.11 セットアップ
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"
      
      # 3. 依存ライブラリのインストール
      - name: 📦 ライブラリインストール
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      # 4. 設定ファイルの準備
      # Secrets（GitHub リポジトリ設定 → Secrets and variables → Actions）に
      # DISCORD_WEBHOOK_URL を登録してください
      - name: ⚙️ 設定ファイル準備
        run: |
          cp config/settings.yaml config/settings_runtime.yaml
          sed -i "s|YOUR_DISCORD_WEBHOOK_URL|${{ secrets.DISCORD_WEBHOOK_URL }}|g" config/settings_runtime.yaml
      
      # 5. スクリーニング実行
      - name: 🚀 スクリーニング実行
        run: |
          python main.py --mode ${{ github.event.inputs.mode || 'full' }} --config config/settings_runtime.yaml
      
      # 6. 結果をアーティファクトとして保存（30日間保持）
      - name: 💾 結果の保存
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screening-results-${{ github.run_number }}
          path: data/results/
          retention-days: 30
      
      # 7. 結果をリポジトリにコミット（オプション）
      - name: 📝 結果をコミット
        uses: stefanzweifel/git-auto-commit-action@v5
        if: success()
        with:
          commit_message: "📊 自動スクリーニング結果 - ${{ github.run_number }}"
          file_pattern: "data/results/*.csv"
          commit_user_name: "Stock AI Bot"
          commit_user_email: "bot@github.actions"

  # エラー時の通知ジョブ
  notify-on-failure:
    name: エラー通知
    runs-on: ubuntu-latest
    needs: stock-scan
    if: failure()
    
    steps:
      - name: ❌ エラー通知
        run: |
          curl -H "Content-Type: application/json" \
            -d '{"content": "⚠️ **Stock AI Investor**: 日次スキャンでエラーが発生しました。GitHubのActionsログを確認してください。"}' \
            ${{ secrets.DISCORD_WEBHOOK_URL }}
