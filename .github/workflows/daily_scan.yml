name: 📊 Daily Stock Scan

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "実行モード"
        required: true
        default: "full"
        type: choice
        options:
          - full
          - policy
          - quick

jobs:
  stock-scan:
    name: 日次スクリーニング
    runs-on: ubuntu-latest

    steps:
      - name: 📥 リポジトリ取得
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11 セットアップ
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 ライブラリインストール
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: ⚙️ 設定ファイル準備
        run: |
          cp config/settings.yaml config/settings_runtime.yaml
          sed -i "s|YOUR_DISCORD_WEBHOOK_URL|${{ secrets.DISCORD_WEBHOOK_URL }}|g" config/settings_runtime.yaml

      - name: 🚀 スクリーニング実行
        env:
          JQUANTS_REFRESH_TOKEN: ${{ secrets.JQUANTS_REFRESH_TOKEN }}
        run: |
          python main.py --mode ${{ github.event.inputs.mode || 'full' }} --config config/settings_runtime.yaml

      - name: 💾 結果の保存
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screening-results-${{ github.run_number }}
          path: data/results/
          retention-days: 30

      - name: 📝 結果をコミット
        uses: stefanzweifel/git-auto-commit-action@v5
        if: success()
        with:
          commit_message: "📊 自動スクリーニング結果 - ${{ github.run_number }}"
          file_pattern: "data/results/*.csv"
          commit_user_name: "Stock AI Bot"
          commit_user_email: "bot@github.actions"

  notify-on-failure:
    name: エラー通知
    runs-on: ubuntu-latest
    needs: stock-scan
    if: failure()
    steps:
      - name: ❌ エラー通知
        run: |
          curl -H "Content-Type: application/json" \
            -d '{"content": "⚠️ **Stock AI Investor**: 日次スキャンでエラーが発生しました。"}' \
            ${{ secrets.DISCORD_WEBHOOK_URL }}
